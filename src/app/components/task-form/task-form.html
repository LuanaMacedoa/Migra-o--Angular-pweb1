<div class="fixed inset-0 flex items-center justify-center bg-black/40 z-50">

  <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md mx-4">

    <h2 class="text-lg font-bold mb-4 text-slate-800">

      {{ isEditing ? 'Editar tarefa' : 'Nova tarefa' }}

    </h2>



    <form (submit)="submit(); $event.preventDefault()">

      <div class="space-y-3">

        <div>

          <label class="text-xs font-semibold text-slate-500 uppercase">Título</label>

          <input [(ngModel)]="task.title" name="title" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none" required />

        </div>

        <div>

          <label class="text-xs font-semibold text-slate-500 uppercase">Data término</label>

          <input type="date" [(ngModel)]="task.due" name="due" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none" required />

        </div>

        <div>

          <label class="text-xs font-semibold text-slate-500 uppercase">Prioridade</label>

          <select [(ngModel)]="task.level" name="level" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none">

            <option value="low">Baixa</option>

            <option value="medium">Média</option>

            <option value="high">Alta</option>

          </select>

        </div>

        <div>

          <label class="text-xs font-semibold text-slate-500 uppercase">Descrição</label>

          <textarea [(ngModel)]="task.desc" name="desc" rows="3" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>

        </div>

      </div>



      <div class="flex justify-end gap-2 mt-6">

        <button type="button" (click)="close.emit()" class="px-4 py-2 text-slate-600 border rounded hover:bg-slate-50 transition cursor-pointer">Cancelar</button>

        <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 active:scale-95 transition cursor-pointer">

          {{ isEditing ? 'Atualizar' : 'Salvar' }}

        </button>

      </div>

    </form>

  </div>

</div>
