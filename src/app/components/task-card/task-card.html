<div class="border p-3 mb-2 rounded bg-white shadow">

  <!-- HEADER -->
  <div class="border p-3 mb-2 rounded bg-white shadow"
     [ngClass]="getColor()">

    <div>
      <div class="font-semibold">{{ task.title }}</div>
      <div class="text-xs text-gray-500">{{ task.due }}</div>
    </div>

    <!-- PRIORIDADE DENTRO DO CARD -->
    <span
      class="text-xs px-2 py-1 rounded text-white"
      [ngClass]="{
        'bg-red-500': task.level === 'high',
        'bg-yellow-500': task.level === 'medium',
        'bg-green-500': task.level === 'low'
      }">
      {{ task.level }}
    </span>

  </div>

  <!-- BOTÕES STATUS -->
  <div class="flex gap-2 mt-3 text-xs">

    <button (click)="setStatus('todo')" class="px-2 py-1 border rounded">
      Todo
    </button>

    <button (click)="setStatus('doing')" class="px-2 py-1 border rounded">
      Doing
    </button>

    <button (click)="setStatus('done')" class="px-2 py-1 border rounded">
      Done
    </button>

  </div>

  <!-- DESCRIÇÃO -->
  <p class="text-sm text-gray-600 mt-2">
    {{ task.desc }}
  </p>

</div>
