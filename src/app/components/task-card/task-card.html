<div class="p-4 border border-slate-200 rounded-md bg-white shadow-sm flex flex-col h-full justify-between hover:shadow-md transition-shadow">

  <div>

    <div class="flex items-start justify-between gap-2">

      <div class="flex items-center gap-3">

        <span class="w-3.5 h-3.5 rounded-full inline-block shrink-0"

          [ngClass]="{

            'bg-red-500': task.level === 'high',

            'bg-yellow-400': task.level === 'medium',

            'bg-green-400': task.level === 'low'

          }">

        </span>

        <div>

          <div class="font-semibold text-slate-800 text-base leading-tight">{{ task.title }}</div>

          <div class="text-xs text-slate-500 mt-0.5">

            Término: {{ task.due }} •

            <span class="font-medium text-slate-600">

              {{ task.level === 'high' ? 'Alta' : task.level === 'medium' ? 'Média' : 'Baixa' }}

            </span>

          </div>

        </div>

      </div>



      <div class="text-right flex items-center gap-2">

        <button (click)="onEditClick()" class="text-xs text-slate-400 hover:text-slate-800 cursor-pointer transition">

          Editar

        </button>

        <button (click)="onDeleteClick()" class="text-xs text-red-400 hover:text-red-600 font-medium cursor-pointer transition">

          Excluir

        </button>

      </div>

    </div>

   

    <p *ngIf="task.desc" class="mt-2.5 text-sm text-slate-600 leading-relaxed pl-6.5">

      {{ task.desc }}

    </p>

  </div>

</div>
