<div class="p-3 border border-slate-200 rounded-md bg-white shadow-sm flex flex-col hover:shadow-md transition-shadow">

  <div class="flex items-start justify-between gap-2">
    <div class="flex items-center gap-2">
      <span class="w-2.5 h-2.5 rounded-full inline-block shrink-0"
        [ngClass]="{
          'bg-red-500': task.level === 'high',
          'bg-yellow-400': task.level === 'medium',
          'bg-green-400': task.level === 'low'
        }">
      </span>
      <div class="font-semibold text-slate-800 text-sm leading-tight">{{ task.title }}</div>
    </div>

    <div class="flex items-center gap-2 shrink-0">
      <button (click)="onEditClick()" class="text-xs text-slate-400 hover:text-slate-800 cursor-pointer transition">
        Editar
      </button>
      <button (click)="onDeleteClick()" class="text-xs text-red-400 hover:text-red-600 font-medium cursor-pointer transition">
        Excluir
      </button>
    </div>
  </div>

  <div class="text-xs text-slate-500 mt-1 pl-4">
    {{ task.due }} • <span class="font-medium text-slate-600">{{ task.level === 'high' ? 'Alta' : task.level === 'medium' ? 'Média' : 'Baixa' }}</span>
  </div>

  <p *ngIf="task.desc" class="mt-1 text-xs text-slate-500 pl-4 truncate">
    {{ task.desc }}
  </p>

</div>
